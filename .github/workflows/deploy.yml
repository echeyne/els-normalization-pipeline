name: Deploy to AWS

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  PYTHON_VERSION: "3.11"

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run unit tests
        run: pytest tests/unit -v

      - name: Run property tests
        run: pytest tests/property -v

      - name: Run integration tests
        run: pytest tests/integration -v

  deploy-dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    environment: dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Package Lambda functions
        run: |
          chmod +x scripts/package_lambda.sh
          ENVIRONMENT=${{ secrets.ENVIRONMENT_NAME }} AWS_REGION=${{ secrets.AWS_REGION }} bash scripts/package_lambda.sh

      - name: Deploy CloudFormation stack
        run: |
          aws cloudformation deploy \
            --template-file infra/template.yaml \
            --stack-name els-pipeline-${{ secrets.ENVIRONMENT_NAME }} \
            --parameter-overrides \
              EnvironmentName=${{ secrets.ENVIRONMENT_NAME }} \
              Region=${{ secrets.AWS_REGION }} \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset

      - name: Update Lambda function code
        run: |
          AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          LAMBDA_BUCKET="els-lambda-code-${{ secrets.ENVIRONMENT_NAME }}-${AWS_ACCOUNT_ID}"

          FUNCTIONS=(
            "els-ingester-${{ secrets.ENVIRONMENT_NAME }}"
            "els-text-extractor-${{ secrets.ENVIRONMENT_NAME }}"
            "els-structure-detector-${{ secrets.ENVIRONMENT_NAME }}"
            "els-hierarchy-parser-${{ secrets.ENVIRONMENT_NAME }}"
            "els-validator-${{ secrets.ENVIRONMENT_NAME }}"
            "els-persistence-${{ secrets.ENVIRONMENT_NAME }}"
          )

          for func in "${FUNCTIONS[@]}"; do
            echo "Updating $func..."
            aws lambda update-function-code \
              --function-name "$func" \
              --s3-bucket "$LAMBDA_BUCKET" \
              --s3-key "els-lambda-package.zip" \
              --output json > /dev/null
          done

      - name: Deployment summary
        run: |
          STACK_NAME="els-pipeline-${{ secrets.ENVIRONMENT_NAME }}"
          RAW_BUCKET=$(aws cloudformation describe-stacks \
            --stack-name $STACK_NAME \
            --query 'Stacks[0].Outputs[?OutputKey==`RawDocumentsBucketName`].OutputValue' \
            --output text)
          PROCESSED_BUCKET=$(aws cloudformation describe-stacks \
            --stack-name $STACK_NAME \
            --query 'Stacks[0].Outputs[?OutputKey==`ProcessedJsonBucketName`].OutputValue' \
            --output text)
          STATE_MACHINE=$(aws cloudformation describe-stacks \
            --stack-name $STACK_NAME \
            --query 'Stacks[0].Outputs[?OutputKey==`PipelineStateMachineArn`].OutputValue' \
            --output text)
          echo "✅ Dev deployment completed successfully!"
          echo "Environment: ${{ secrets.ENVIRONMENT_NAME }}"
          echo "Region: ${{ secrets.AWS_REGION }}"
          echo "Raw Documents Bucket: $RAW_BUCKET"
          echo "Processed JSON Bucket: $PROCESSED_BUCKET"
          echo "State Machine: $STATE_MACHINE"

  deploy-prod:
    name: Deploy to Prod
    runs-on: ubuntu-latest
    needs: deploy-dev
    if: github.event_name == 'push'
    environment: prod

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Package Lambda functions
        run: |
          chmod +x scripts/package_lambda.sh
          ENVIRONMENT=${{ secrets.ENVIRONMENT_NAME }} AWS_REGION=${{ secrets.AWS_REGION }} bash scripts/package_lambda.sh

      - name: Deploy CloudFormation stack
        run: |
          aws cloudformation deploy \
            --template-file infra/template.yaml \
            --stack-name els-pipeline-${{ secrets.ENVIRONMENT_NAME }} \
            --parameter-overrides \
              EnvironmentName=${{ secrets.ENVIRONMENT_NAME }} \
              Region=${{ secrets.AWS_REGION }} \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset

      - name: Update Lambda function code
        run: |
          AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          LAMBDA_BUCKET="els-lambda-code-${{ secrets.ENVIRONMENT_NAME }}-${AWS_ACCOUNT_ID}"

          FUNCTIONS=(
            "els-ingester-${{ secrets.ENVIRONMENT_NAME }}"
            "els-text-extractor-${{ secrets.ENVIRONMENT_NAME }}"
            "els-structure-detector-${{ secrets.ENVIRONMENT_NAME }}"
            "els-hierarchy-parser-${{ secrets.ENVIRONMENT_NAME }}"
            "els-validator-${{ secrets.ENVIRONMENT_NAME }}"
            "els-persistence-${{ secrets.ENVIRONMENT_NAME }}"
          )

          for func in "${FUNCTIONS[@]}"; do
            echo "Updating $func..."
            aws lambda update-function-code \
              --function-name "$func" \
              --s3-bucket "$LAMBDA_BUCKET" \
              --s3-key "els-lambda-package.zip" \
              --output json > /dev/null
          done

      - name: Deployment summary
        run: |
          STACK_NAME="els-pipeline-${{ secrets.ENVIRONMENT_NAME }}"
          RAW_BUCKET=$(aws cloudformation describe-stacks \
            --stack-name $STACK_NAME \
            --query 'Stacks[0].Outputs[?OutputKey==`RawDocumentsBucketName`].OutputValue' \
            --output text)
          PROCESSED_BUCKET=$(aws cloudformation describe-stacks \
            --stack-name $STACK_NAME \
            --query 'Stacks[0].Outputs[?OutputKey==`ProcessedJsonBucketName`].OutputValue' \
            --output text)
          STATE_MACHINE=$(aws cloudformation describe-stacks \
            --stack-name $STACK_NAME \
            --query 'Stacks[0].Outputs[?OutputKey==`PipelineStateMachineArn`].OutputValue' \
            --output text)
          echo "✅ Prod deployment completed successfully!"
          echo "Environment: ${{ secrets.ENVIRONMENT_NAME }}"
          echo "Region: ${{ secrets.AWS_REGION }}"
          echo "Raw Documents Bucket: $RAW_BUCKET"
          echo "Processed JSON Bucket: $PROCESSED_BUCKET"
          echo "State Machine: $STATE_MACHINE"
