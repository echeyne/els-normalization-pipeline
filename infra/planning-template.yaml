AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: |
  ELS Parent Planning Tool Infrastructure
  - Frontend: S3 + CloudFront (plan.<domain>.com)
  - Planning API: Lambda + API Gateway (Hono, SSE streaming)
  - Action Group Lambda: Bedrock Agent DB read/write
  - Bedrock Agent with guardrails and action groups

Parameters:
  EnvironmentName:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]
  PipelineStackName:
    Type: String
    Default: els-pipeline-dev
    Description: Name of the pipeline CloudFormation stack (for cross-stack VPC/DB references)
  CustomDomainName:
    Type: String
    Default: ""
    Description: Custom domain name for the planning site (e.g. plan.example.com). Leave empty to use CloudFront URL.
  HostedZoneId:
    Type: String
    Default: ""
    Description: Route53 Hosted Zone ID for the custom domain. Required when CustomDomainName is set.
  DescopeProjectId:
    Type: String
    Description: Descope project ID for authentication
    NoEcho: true
  BedrockAgentModelId:
    Type: String
    Default: us.anthropic.claude-sonnet-4-6-v1
    Description: Bedrock foundation model ID for the planning agent

Conditions:
  HasCustomDomain: !Not [!Equals [!Ref CustomDomainName, ""]]

Resources:
  # ─── Frontend: S3 bucket for static assets ───
  PlanningFrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "els-planning-frontend-${EnvironmentName}-${AWS::AccountId}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: Project
          Value: ELS-Planning

  PlanningFrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref PlanningFrontendBucket
      PolicyDocument:
        Statement:
          - Sid: AllowCloudFrontOAC
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${PlanningFrontendBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${PlanningCloudFrontDistribution}"

  # ─── CloudFront Distribution ───
  PlanningCloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "els-planning-oac-${EnvironmentName}"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  PlanningCloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub "ELS Planning Tool - ${EnvironmentName}"
        DefaultRootObject: index.html
        HttpVersion: http2and3
        Aliases: !If
          - HasCustomDomain
          - [!Ref CustomDomainName]
          - !Ref "AWS::NoValue"
        ViewerCertificate: !If
          - HasCustomDomain
          - AcmCertificateArn: !Ref PlanningDomainCertificate
            SslSupportMethod: sni-only
            MinimumProtocolVersion: TLSv1.2_2021
          - !Ref "AWS::NoValue"
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt PlanningFrontendBucket.RegionalDomainName
            OriginAccessControlId: !Ref PlanningCloudFrontOAC
            S3OriginConfig:
              OriginAccessIdentity: ""
          - Id: ApiOrigin
            DomainName: !Sub "${PlanningApiGateway}.execute-api.${AWS::Region}.amazonaws.com"
            CustomOriginConfig:
              HTTPSPort: 443
              OriginProtocolPolicy: https-only
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6 # CachingOptimized
          Compress: true
        CacheBehaviors:
          - PathPattern: "/api/*"
            TargetOriginId: ApiOrigin
            ViewerProtocolPolicy: redirect-to-https
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad # CachingDisabled
            OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac # AllViewerExceptHostHeader
            AllowedMethods: [GET, HEAD, OPTIONS, PUT, PATCH, POST, DELETE]
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: Project
          Value: ELS-Planning

  # ─── Planning API: Lambda Function ───
  PlanningApiLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "els-planning-api-role-${EnvironmentName}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: BedrockAgentInvoke
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:InvokeAgent
                Resource:
                  - !Sub "arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:agent/*"
                  - !Sub "arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:agent-alias/*"
        - PolicyName: RdsDataReadOnly
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - rds-data:ExecuteStatement
                  - rds-data:BatchExecuteStatement
                Resource:
                  - !ImportValue
                    Fn::Sub: "${PipelineStackName}-DatabaseClusterArn"
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource:
                  - !ImportValue
                    Fn::Sub: "${PipelineStackName}-DatabaseSecretArn"
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: Project
          Value: ELS-Planning

  PlanningApiLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "els-planning-api-${EnvironmentName}"
      Runtime: nodejs20.x
      Handler: index.handler
      Role: !GetAtt PlanningApiLambdaRole.Arn
      Timeout: 120
      MemorySize: 512
      Environment:
        Variables:
          ENVIRONMENT: !Ref EnvironmentName
          DB_CLUSTER_ARN: !ImportValue
            Fn::Sub: "${PipelineStackName}-DatabaseClusterArn"
          DB_SECRET_ARN: !ImportValue
            Fn::Sub: "${PipelineStackName}-DatabaseSecretArn"
          DB_NAME: els_pipeline
          DESCOPE_PROJECT_ID: !Ref DescopeProjectId
          BEDROCK_AGENT_ID: !Ref PlanningBedrockAgent
          BEDROCK_AGENT_ALIAS_ID: !GetAtt PlanningBedrockAgentAlias.AgentAliasId
      Code:
        ZipFile: |
          exports.handler = async () => ({ statusCode: 200, body: 'placeholder' });
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: Project
          Value: ELS-Planning

  # ─── Planning API: API Gateway (HTTP API with streaming) ───
  PlanningApiGateway:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub "els-planning-api-${EnvironmentName}"
      ProtocolType: HTTP

  PlanningApiGatewayIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref PlanningApiGateway
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt PlanningApiLambdaFunction.Arn
      PayloadFormatVersion: "2.0"

  PlanningApiGatewayRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref PlanningApiGateway
      RouteKey: "$default"
      Target: !Sub "integrations/${PlanningApiGatewayIntegration}"

  PlanningApiGatewayStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref PlanningApiGateway
      StageName: "$default"
      AutoDeploy: true

  PlanningApiLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref PlanningApiLambdaFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${PlanningApiGateway}/*"

  # ─── Action Group Lambda ───
  ActionGroupLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "els-planning-action-group-role-${EnvironmentName}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: RdsDataReadWrite
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - rds-data:ExecuteStatement
                  - rds-data:BatchExecuteStatement
                  - rds-data:BeginTransaction
                  - rds-data:CommitTransaction
                  - rds-data:RollbackTransaction
                Resource:
                  - !ImportValue
                    Fn::Sub: "${PipelineStackName}-DatabaseClusterArn"
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource:
                  - !ImportValue
                    Fn::Sub: "${PipelineStackName}-DatabaseSecretArn"
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: Project
          Value: ELS-Planning

  ActionGroupLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "els-planning-action-group-${EnvironmentName}"
      Runtime: nodejs20.x
      Handler: index.handler
      Role: !GetAtt ActionGroupLambdaRole.Arn
      Timeout: 30
      MemorySize: 512
      Environment:
        Variables:
          ENVIRONMENT: !Ref EnvironmentName
          DB_CLUSTER_ARN: !ImportValue
            Fn::Sub: "${PipelineStackName}-DatabaseClusterArn"
          DB_SECRET_ARN: !ImportValue
            Fn::Sub: "${PipelineStackName}-DatabaseSecretArn"
          DB_NAME: els_pipeline
      Code:
        ZipFile: |
          exports.handler = async () => ({ statusCode: 200, body: 'placeholder' });
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: Project
          Value: ELS-Planning

  ActionGroupLambdaBedrockPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ActionGroupLambdaFunction
      Action: lambda:InvokeFunction
      Principal: bedrock.amazonaws.com
      SourceArn: !Sub "arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:agent/*"

  # ─── Bedrock Agent ───
  PlanningBedrockAgentRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "els-planning-agent-role-${EnvironmentName}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: bedrock.amazonaws.com
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref "AWS::AccountId"
      Policies:
        - PolicyName: BedrockModelInvoke
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                Resource:
                  - !Sub "arn:aws:bedrock:${AWS::Region}::foundation-model/${BedrockAgentModelId}"
        - PolicyName: BedrockGuardrailAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:ApplyGuardrail
                Resource:
                  - !Sub "arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:guardrail/*"
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: Project
          Value: ELS-Planning

  PlanningBedrockGuardrail:
    Type: AWS::Bedrock::Guardrail
    Properties:
      Name: !Sub "els-planning-guardrail-${EnvironmentName}"
      Description: "Guardrails for the Parent Planning Tool Bedrock Agent"
      BlockedInputMessaging: "I'm sorry, but I can only help with creating and refining learning plans for your child. Could you please ask me something related to your child's learning plan?"
      BlockedOutputsMessaging: "I'm sorry, but I'm unable to provide that type of response. I'm here to help you create and refine learning plans for your child. Let's get back to planning!"
      ContentPolicyConfig:
        FiltersConfig:
          - Type: SEXUAL
            InputStrength: HIGH
            OutputStrength: HIGH
          - Type: VIOLENCE
            InputStrength: HIGH
            OutputStrength: HIGH
          - Type: HATE
            InputStrength: HIGH
            OutputStrength: HIGH
          - Type: INSULTS
            InputStrength: HIGH
            OutputStrength: HIGH
          - Type: MISCONDUCT
            InputStrength: HIGH
            OutputStrength: HIGH
          - Type: PROMPT_ATTACK
            InputStrength: HIGH
            OutputStrength: NONE
      TopicPolicyConfig:
        TopicsConfig:
          - Name: MedicalAdvice
            Definition: "Providing medical advice, medical diagnoses, treatment recommendations, medication suggestions, or any guidance that should come from a licensed healthcare professional."
            Examples:
              - "What medication should I give my child for ADHD?"
              - "Is my child's development normal for their age?"
            Type: DENY
          - Name: DevelopmentalDiagnoses
            Definition: "Diagnosing or suggesting developmental conditions, disabilities, learning disorders, behavioral disorders, or any clinical assessment of a child's developmental status."
            Examples:
              - "Does my child have a learning disability?"
              - "My child might be on the autism spectrum, can you confirm?"
            Type: DENY
          - Name: TherapeuticRecommendations
            Definition: "Recommending specific therapies, therapeutic interventions, counseling approaches, or clinical treatment plans that should be prescribed by licensed therapists or clinicians."
            Examples:
              - "What type of therapy does my child need?"
              - "Should my child get speech therapy?"
            Type: DENY
          - Name: Politics
            Definition: "Discussing political topics, political parties, elections, government policies, political opinions, or politically divisive subjects."
            Examples:
              - "What do you think about the current education policy?"
              - "Which political party supports early childhood education?"
            Type: DENY
          - Name: Religion
            Definition: "Discussing religious beliefs, religious practices, religious education, faith-based parenting, or promoting any particular religious viewpoint."
            Examples:
              - "Should I include religious education in my child's plan?"
              - "What does the Bible say about raising children?"
            Type: DENY
          - Name: PersonalRelationships
            Definition: "Providing advice on personal relationships, marital issues, family conflicts, co-parenting disputes, custody matters, or interpersonal relationship guidance."
            Examples:
              - "My spouse and I disagree on parenting, what should I do?"
              - "How do I handle my ex's parenting style?"
            Type: DENY
          - Name: FinancialAdvice
            Definition: "Providing financial advice, investment recommendations, budgeting guidance, cost comparisons of educational programs, or any monetary planning guidance."
            Examples:
              - "How much should I save for my child's education?"
              - "Is private preschool worth the cost?"
            Type: DENY
      SensitiveInformationPolicyConfig:
        PiiEntitiesConfig:
          - Type: EMAIL
            Action: BLOCK
          - Type: PHONE
            Action: BLOCK
          - Type: US_SOCIAL_SECURITY_NUMBER
            Action: BLOCK
          - Type: CREDIT_DEBIT_CARD_NUMBER
            Action: BLOCK
          - Type: US_BANK_ACCOUNT_NUMBER
            Action: BLOCK
          - Type: IP_ADDRESS
            Action: BLOCK
          - Type: URL
            Action: BLOCK
          - Type: DRIVER_ID
            Action: BLOCK
          - Type: US_PASSPORT_NUMBER
            Action: BLOCK
          - Type: US_INDIVIDUAL_TAX_IDENTIFICATION_NUMBER
            Action: BLOCK
        RegexesConfig:
          - Name: EmailPattern
            Description: "Matches email addresses"
            Pattern: "[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\\.[A-Za-z]{2,}"
            Action: BLOCK
          - Name: PhonePattern
            Description: "Matches US phone numbers"
            Pattern: "(\\+?1[-\\s.]?)?\\(?\\d{3}\\)?[-\\s.]?\\d{3}[-\\s.]?\\d{4}"
            Action: BLOCK
          - Name: SSNPattern
            Description: "Matches US Social Security Numbers"
            Pattern: "\\b\\d{3}[-\\s]?\\d{2}[-\\s]?\\d{4}\\b"
            Action: BLOCK
      WordPolicyConfig:
        ManagedWordListsConfig:
          - Type: PROFANITY
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: Project
          Value: ELS-Planning

  PlanningBedrockGuardrailVersion:
    Type: AWS::Bedrock::GuardrailVersion
    Properties:
      GuardrailIdentifier: !Ref PlanningBedrockGuardrail
      Description: !Sub "Planning guardrail version - ${EnvironmentName}"

  PlanningBedrockAgent:
    Type: AWS::Bedrock::Agent
    Properties:
      AgentName: !Sub "els-planning-agent-${EnvironmentName}"
      Description: "Parent Planning Tool conversational agent for creating personalized early learning plans"
      AgentResourceRoleArn: !GetAtt PlanningBedrockAgentRole.Arn
      FoundationModel: !Ref BedrockAgentModelId
      IdleSessionTTLInSeconds: 1800
      Instruction: |
        You are a friendly, supportive early learning planning assistant that helps parents create personalized learning plans for their children. You guide parents through a structured conversation to collect information, then generate evidence-based activity plans grounded in real state-specific early learning standards.

        You have access to two action groups:
        - StandardsQuery: Query the standards database for available states, age bands, and learning indicators.
        - PlanManagement: Create, update, retrieve, and delete learning plans.

        Follow the multi-step planning workflow: collect child profile (name, state, age), gather interests and concerns, ask for plan duration, confirm inputs, query standards via action group, generate plan, and persist plan via action group.

        Use ONLY indicators returned by the StandardsQuery action group. NEVER fabricate indicator codes or descriptions. Reference specific indicator codes in each activity. If a state/age combination has no data, inform the parent and suggest alternatives.

        Only use the child's first name. Do not ask for or store any other PII. Do not provide medical advice, developmental diagnoses, or therapeutic recommendations. Stay on topic — early learning plan creation only.
      GuardrailConfiguration:
        GuardrailIdentifier: !Ref PlanningBedrockGuardrail
        GuardrailVersion: !GetAtt PlanningBedrockGuardrailVersion.Version
      ActionGroups:
        - ActionGroupName: StandardsQuery
          Description: "Query the standards database for available states, age bands, and learning indicators"
          ActionGroupExecutor:
            Lambda: !GetAtt ActionGroupLambdaFunction.Arn
          ApiSchema:
            Payload: |
              {
                "openapi": "3.0.3",
                "info": {
                  "title": "StandardsQuery Action Group",
                  "description": "Query the standards database for available states, age bands, and learning indicators",
                  "version": "1.0.0"
                },
                "paths": {
                  "/getAvailableStates": {
                    "get": {
                      "operationId": "getAvailableStates",
                      "summary": "Get available states with standards data",
                      "description": "Returns a list of all state codes that have early learning standards data available in the database.",
                      "responses": {
                        "200": {
                          "description": "List of state codes",
                          "content": {
                            "application/json": {
                              "schema": {
                                "type": "object",
                                "properties": {
                                  "states": {
                                    "type": "array",
                                    "items": { "type": "string" },
                                    "description": "Array of state abbreviation codes"
                                  }
                                }
                              }
                            }
                          }
                        }
                      }
                    }
                  },
                  "/getAgeBands": {
                    "get": {
                      "operationId": "getAgeBands",
                      "summary": "Get age bands for a state",
                      "description": "Returns the available age bands for a given state's early learning standards.",
                      "parameters": [
                        {
                          "name": "state",
                          "in": "query",
                          "required": true,
                          "description": "Two-letter state abbreviation code (e.g. OH, CA)",
                          "schema": { "type": "string" }
                        }
                      ],
                      "responses": {
                        "200": {
                          "description": "List of age bands",
                          "content": {
                            "application/json": {
                              "schema": {
                                "type": "object",
                                "properties": {
                                  "ageBands": {
                                    "type": "array",
                                    "items": { "type": "string" },
                                    "description": "Array of age band labels"
                                  }
                                }
                              }
                            }
                          }
                        }
                      }
                    }
                  },
                  "/getIndicators": {
                    "get": {
                      "operationId": "getIndicators",
                      "summary": "Get indicators for a state and age band",
                      "description": "Returns learning indicators for a specific state and age band combination.",
                      "parameters": [
                        {
                          "name": "state",
                          "in": "query",
                          "required": true,
                          "description": "Two-letter state abbreviation code (e.g. OH, CA)",
                          "schema": { "type": "string" }
                        },
                        {
                          "name": "ageBand",
                          "in": "query",
                          "required": true,
                          "description": "Age band label to filter indicators by (e.g. Birth-12 Months)",
                          "schema": { "type": "string" }
                        }
                      ],
                      "responses": {
                        "200": {
                          "description": "List of indicators",
                          "content": {
                            "application/json": {
                              "schema": {
                                "type": "object",
                                "properties": {
                                  "indicators": {
                                    "type": "array",
                                    "description": "Array of learning indicator objects",
                                    "items": {
                                      "type": "object",
                                      "properties": {
                                        "code": { "type": "string", "description": "Unique indicator code" },
                                        "description": { "type": "string", "description": "Indicator description text" },
                                        "domain_name": { "type": "string", "description": "Learning domain name" },
                                        "strand_name": { "type": "string", "description": "Strand within the domain" },
                                        "sub_strand_name": { "type": "string", "description": "Sub-strand within the strand" },
                                        "age_band": { "type": "string", "description": "Age band this indicator applies to" }
                                      }
                                    }
                                  }
                                }
                              }
                            }
                          }
                        }
                      }
                    }
                  }
                }
              }
        - ActionGroupName: PlanManagement
          Description: "Create, update, retrieve, and delete learning plans"
          ActionGroupExecutor:
            Lambda: !GetAtt ActionGroupLambdaFunction.Arn
          ApiSchema:
            Payload: |
              {
                "openapi": "3.0.3",
                "info": {
                  "title": "PlanManagement Action Group",
                  "description": "Create, update, retrieve, and delete learning plans",
                  "version": "1.0.0"
                },
                "paths": {
                  "/createPlan": {
                    "post": {
                      "operationId": "createPlan",
                      "summary": "Create a new learning plan",
                      "description": "Creates a new personalized learning plan for a child and persists it to the database.",
                      "requestBody": {
                        "required": true,
                        "content": {
                          "application/json": {
                            "schema": {
                              "type": "object",
                              "required": ["userId", "childName", "childAge", "state", "duration", "content"],
                              "properties": {
                                "userId": { "type": "string", "description": "Authenticated user ID of the parent" },
                                "childName": { "type": "string", "description": "First name of the child" },
                                "childAge": { "type": "string", "description": "Age of the child (e.g. 3 years)" },
                                "state": { "type": "string", "description": "Two-letter state abbreviation code" },
                                "interests": { "type": "string", "description": "Child interests noted by the parent" },
                                "concerns": { "type": "string", "description": "Parent concerns about the child's development" },
                                "duration": { "type": "string", "description": "Plan duration (e.g. 1 week, 2 weeks)" },
                                "content": { "type": "string", "description": "Full generated plan content in markdown format" }
                              }
                            }
                          }
                        }
                      },
                      "responses": {
                        "201": { "description": "Plan created successfully" }
                      }
                    }
                  },
                  "/updatePlan": {
                    "put": {
                      "operationId": "updatePlan",
                      "summary": "Update an existing learning plan",
                      "description": "Updates the content of an existing learning plan.",
                      "parameters": [
                        {
                          "name": "planId",
                          "in": "query",
                          "required": true,
                          "description": "Unique identifier of the plan to update",
                          "schema": { "type": "string" }
                        },
                        {
                          "name": "userId",
                          "in": "query",
                          "required": true,
                          "description": "Authenticated user ID of the plan owner",
                          "schema": { "type": "string" }
                        }
                      ],
                      "requestBody": {
                        "required": true,
                        "content": {
                          "application/json": {
                            "schema": {
                              "type": "object",
                              "required": ["content"],
                              "properties": {
                                "content": { "type": "string", "description": "Updated plan content in markdown format" }
                              }
                            }
                          }
                        }
                      },
                      "responses": {
                        "200": { "description": "Plan updated successfully" }
                      }
                    }
                  },
                  "/getPlan": {
                    "get": {
                      "operationId": "getPlan",
                      "summary": "Retrieve a learning plan",
                      "description": "Retrieves a specific learning plan by its ID for the given user.",
                      "parameters": [
                        {
                          "name": "planId",
                          "in": "query",
                          "required": true,
                          "description": "Unique identifier of the plan to retrieve",
                          "schema": { "type": "string" }
                        },
                        {
                          "name": "userId",
                          "in": "query",
                          "required": true,
                          "description": "Authenticated user ID of the plan owner",
                          "schema": { "type": "string" }
                        }
                      ],
                      "responses": {
                        "200": { "description": "Plan details returned successfully" }
                      }
                    }
                  },
                  "/deletePlan": {
                    "delete": {
                      "operationId": "deletePlan",
                      "summary": "Delete a learning plan",
                      "description": "Permanently deletes a learning plan by its ID for the given user.",
                      "parameters": [
                        {
                          "name": "planId",
                          "in": "query",
                          "required": true,
                          "description": "Unique identifier of the plan to delete",
                          "schema": { "type": "string" }
                        },
                        {
                          "name": "userId",
                          "in": "query",
                          "required": true,
                          "description": "Authenticated user ID of the plan owner",
                          "schema": { "type": "string" }
                        }
                      ],
                      "responses": {
                        "200": { "description": "Plan deleted successfully" }
                      }
                    }
                  }
                }
              }
      Tags:
        Environment: !Ref EnvironmentName
        Project: ELS-Planning

  PlanningBedrockAgentAlias:
    Type: AWS::Bedrock::AgentAlias
    Properties:
      AgentId: !Ref PlanningBedrockAgent
      AgentAliasName: !Sub "planning-${EnvironmentName}"
      Description: !Sub "Planning agent alias for ${EnvironmentName}"

  # ─── Custom Domain (conditional) ───
  PlanningDomainCertificate:
    Type: AWS::CertificateManager::Certificate
    Condition: HasCustomDomain
    Properties:
      DomainName: !Ref CustomDomainName
      ValidationMethod: DNS
      DomainValidationOptions:
        - DomainName: !Ref CustomDomainName
          HostedZoneId: !Ref HostedZoneId
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: Project
          Value: ELS-Planning

  PlanningDnsRecord:
    Type: AWS::Route53::RecordSet
    Condition: HasCustomDomain
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref CustomDomainName
      Type: A
      AliasTarget:
        DNSName: !GetAtt PlanningCloudFrontDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2 # CloudFront global hosted zone ID
        EvaluateTargetHealth: false

Outputs:
  PlanningFrontendBucketName:
    Value: !Ref PlanningFrontendBucket
    Description: S3 bucket for planning frontend static assets

  PlanningCloudFrontDomainName:
    Value: !GetAtt PlanningCloudFrontDistribution.DomainName
    Description: CloudFront distribution URL for the planning site

  PlanningCloudFrontDistributionId:
    Value: !Ref PlanningCloudFrontDistribution
    Description: CloudFront distribution ID (for cache invalidation)

  PlanningApiGatewayUrl:
    Value: !Sub "https://${PlanningApiGateway}.execute-api.${AWS::Region}.amazonaws.com"
    Description: Planning API Gateway endpoint URL

  PlanningApiLambdaFunctionName:
    Value: !Ref PlanningApiLambdaFunction
    Description: Planning API Lambda function name

  ActionGroupLambdaFunctionName:
    Value: !Ref ActionGroupLambdaFunction
    Description: Action Group Lambda function name

  PlanningBedrockAgentId:
    Value: !Ref PlanningBedrockAgent
    Description: Bedrock Agent ID

  PlanningBedrockAgentAliasId:
    Value: !GetAtt PlanningBedrockAgentAlias.AgentAliasId
    Description: Bedrock Agent Alias ID

  PlanningGuardrailId:
    Value: !Ref PlanningBedrockGuardrail
    Description: Bedrock Guardrail ID

  PlanningCustomDomainUrl:
    Condition: HasCustomDomain
    Value: !Sub "https://${CustomDomainName}"
    Description: Custom domain URL for the planning site
